<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>硕策 导航页</title>

<link rel="stylesheet" href="css/main.css">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>

<!-- 粒子背景 -->
<div id="particles-js"></div>

<!-- 主题切换 -->
<div class="theme-switch">
    <button onclick="setTheme('glass')">🧊</button>
    <button onclick="setTheme('transparent')">👁️</button>
    <button onclick="setTheme('dark')">🌙</button>
    <button onclick="setTheme('light')">☀️</button>
</div>

<div class="container">
<div class="panel">

<!-- ===== 头部 ===== -->
<div class="header">
<img id="avatar" src="Personalization/avatar.png">

<h1>硕策 导航页</h1>

<div class="time" id="time">00:00:00</div>
<div class="date" id="date">加载中...</div>

<div id="weather" class="weather">🌤️ 获取天气中...</div>
<div id="welcome" class="welcome">加载中...</div>
</div>

<!-- ===== 搜索 ===== -->
<div class="search-box">
<form class="search-form" onsubmit="doSearch(event)">

<select id="engine">
<option value="google">Google</option>
<option value="bing">Bing</option>
</select>

<input id="keyword" placeholder="输入关键词搜索..." required>

<button type="submit">搜索</button>

</form>
</div>

<!-- ===== 常用网站 ===== -->
<div class="fold-header" id="commonHeader">
    <span class="fold-arrow" id="commonArrow">▼</span>
    <span>常用网站</span>
</div>

<div class="fold-content show" id="commonContent">
<div class="grid">

<a class="card" href="https://chatgpt.com" target="_blank">
<i class="bi bi-robot"></i>
<div class="card-title">ChatGPT</div>
<div class="card-desc">AI 助手</div>
</a>

<a class="card" href="https://www.doubao.com" target="_blank">
<i class="bi bi-lightning-charge"></i>
<div class="card-title">豆包</div>
<div class="card-desc">字节 AI</div>
</a>

<a class="card" href="https://www.wenxiaobai.com" target="_blank">
<i class="bi bi-chat-dots"></i>
<div class="card-title">问小白</div>
<div class="card-desc">智能问答</div>
</a>

<a class="card" href="https://www.youtube.com" target="_blank">
<i class="bi bi-youtube"></i>
<div class="card-title">YouTube</div>
<div class="card-desc">视频平台</div>
</a>

<a class="card" href="https://www.bilibili.com" target="_blank">
<i class="bi bi-play-btn"></i>
<div class="card-title">哔哩哔哩</div>
<div class="card-desc">Bilibili</div>
</a>

<a class="card" href="https://www.douyin.com" target="_blank">
<i class="bi bi-music-note-beamed"></i>
<div class="card-title">抖音</div>
<div class="card-desc">短视频</div>
</a>

<a class="card" href="https://x.com" target="_blank">
<i class="bi bi-twitter-x"></i>
<div class="card-title">X</div>
<div class="card-desc">社交平台</div>
</a>

</div>
</div>

<!-- ===== Music ===== -->
<div class="fold-header" id="musicHeader">
    <span class="fold-arrow" id="musicArrow">▶</span>
    <span>Music</span>
</div>

<div class="fold-content" id="musicContent">
<div class="grid">

<a class="card" href="https://www.gequbao.com/" target="_blank">
<i class="bi bi-cloud-download"></i>
<div class="card-title">歌曲宝</div>
<div class="card-desc">在线试听 / 下载</div>
</a>

<a class="card" href="https://zz123.com/" target="_blank">
<i class="bi bi-music-note-list"></i>
<div class="card-title">种子音乐</div>
<div class="card-desc">在线听歌</div>
</a>

<a class="card" href="https://www.qqmp3.vip/" target="_blank">
<i class="bi bi-headphones"></i>
<div class="card-title">米兔音乐</div>
<div class="card-desc">免费音乐</div>
</a>

</div>
</div>

<!-- ===== 一言 ===== -->
<div class="quote-box" id="hitokoto">加载中...</div>

<!-- ===== footer ===== -->
<div class="footer">
<div id="runtime">🚀 已运行 0 天</div>

<br>

© 2026 shuoce.eu.cc

<br><br>

<span>
👀 <span id="busuanzi_value_site_pv"></span> 次访问
</span>

&nbsp;&nbsp;|&nbsp;&nbsp;

<span>
🌍 <span id="busuanzi_value_site_uv"></span> 位访客
</span>
</div>

</div>
</div>

<!-- ===== JS ===== -->
<script src="js/app.js"></script>
<script src="js/music.js"></script>

<!-- busuanzi -->
<script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>

<!-- 粒子 -->
<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

</body>
</html>
