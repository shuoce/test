<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>主页</title>

<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>

<div id="particles-js"></div>

<div class="theme-switch">
  <button onclick="setTheme('glass')">🧊</button>
  <button onclick="setTheme('transparent')">👁️</button>
  <button onclick="setTheme('dark')">🌙</button>
  <button onclick="setTheme('light')">☀️</button>
</div>

<div class="container">
<div class="panel">

<!-- HEADER -->
<div class="header">
  <img id="avatar" src="Personalization/avatar.png">

  <h1>主页</h1>

  <div class="time" id="time"></div>
  <div class="date" id="date"></div>
  <div id="weather" class="weather"></div>
  <div id="welcome" class="welcome"></div>
</div>

<!-- SEARCH -->
<div class="search-box">
<form class="search-form" onsubmit="doSearch(event)">
<select id="engine">
  <option value="google">Google</option>
  <option value="bing">Bing</option>
</select>

<input id="keyword" placeholder="搜索..." required>
<button type="submit">搜索</button>
</form>
</div>

<!-- 卡片 -->
<div class="grid">
  <a class="card" href="https://chatgpt.com"><i class="bi bi-robot"></i>ChatGPT</a>
  <a class="card" href="https://www.youtube.com"><i class="bi bi-youtube"></i>YouTube</a>
</div>

<!-- 折叠 -->
<div class="fold-header" id="commonHeader">常用网站</div>
<div class="fold-content show" id="commonContent">
  <div class="grid">
    <a class="card" href="https://www.bilibili.com">B站</a>
  </div>
</div>

<div class="fold-header" id="musicHeader">Music</div>
<div class="fold-content" id="musicContent">
  <div class="grid">
    <a class="card" href="https://zz123.com">在线音乐</a>
  </div>
</div>

<!-- 一言 -->
<div class="quote-box" id="hitokoto">加载中...</div>

<!-- runtime -->
<div class="footer">
  <div id="runtime"></div>
</div>

</div>
</div>

<!-- 音乐挂载 -->
<div id="musicBox"></div>

<script src="js/app.js"></script>
<script src="js/music.js"></script>

<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

</body>
</html>
